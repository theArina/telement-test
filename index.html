<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>telement</title>
    <style>
      /* First paint: theme + loader before JS/CSS bundle (matches App shell) */
      html {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        background: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
        }
      }
      #root {
        min-height: 100dvh;
      }
      .app-shell {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 2rem 1rem;
        max-width: 48rem;
        margin: 0 auto;
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.875rem;
        color: #525252;
      }
      @media (prefers-color-scheme: dark) {
        .app-shell {
          color: #a3a3a3;
        }
      }
      .app-shell-spin {
        box-sizing: border-box;
        width: 1.5rem;
        height: 1.5rem;
        flex-shrink: 0;
        border: 2px solid #d4d4d4;
        border-top-color: #525252;
        border-radius: 50%;
        animation: app-shell-spin 0.8s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .app-shell-spin {
          border-color: #525252;
          border-top-color: #d4d4d4;
        }
      }
      @keyframes app-shell-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell" role="status" aria-live="polite">
        <span class="app-shell-spin" aria-hidden="true"></span>
        <span>Loading…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
